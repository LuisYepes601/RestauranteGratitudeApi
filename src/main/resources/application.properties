spring.application.name=restaurante_gratitude

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.databasesplatform=org.hibernate.dialect.PostgreSQLDialect

# Mostrar las consultas SQL en consola (opcional, muy útil para debug)
